[platformio]
default_envs = esp32dev-uart

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
build_flags =
    -DCORE_DEBUG_LEVEL=0

; Classic ESP32 development boards using USB-to-UART.
[env:esp32dev-uart]
board = esp32dev

; ESP32-C3 boards using a CH340, CP210x, or other USB-to-UART bridge.
[env:esp32-c3-uart]
board = esp32-c3-devkitm-1

; ESP32-C3 boards connected through the chip's native USB Serial/JTAG port.
[env:esp32-c3-native-usb]
board = esp32-c3-devkitm-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 0
monitor_rts = 0

; ESP32-S3 boards using a CH340, CP210x, or other USB-to-UART bridge.
[env:esp32-s3-uart]
board = esp32-s3-devkitc-1

; ESP32-S3 boards connected through the chip's native USB Serial/JTAG port.
[env:esp32-s3-native-usb]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 0
monitor_rts = 0

; Other Wi-Fi-capable ESP32-family boards can be added by copying one of the
; environments above and replacing only the PlatformIO board ID.
